# ============================================================
# Theme
# ============================================================
# BEGIN_KITTY_THEME
# Tokyo Night Storm
include current-theme.conf
# END_KITTY_THEME

# ============================================================
# Font
# ============================================================
font_family JetBrains Mono Nerd Font
font_size 16
# Enable ligatures (!=, =>, <= etc.)
disable_ligatures never

# ============================================================
# Cursor
# ============================================================
# Never stop blinking (default 15s)
cursor_stop_blinking_after 0

# ============================================================
# Mouse
# ============================================================
# Never hide mouse cursor (default 3s)
mouse_hide_wait 0
# Copy to clipboard on select
copy_on_select yes
# Word characters for double-click selection (paths and URLs)
select_by_word_characters @-./_~?&=%+#a

# ============================================================
# Scrollback
# ============================================================
# More history for long build outputs (default 2000)
scrollback_lines 10000

# ============================================================
# Bell
# ============================================================
enable_audio_bell no

# ============================================================
# URL Handling
# ============================================================
url_style curly
detect_urls yes

# ============================================================
# Window
# ============================================================
# Let bspwm manage window size
remember_window_size no
# No border between kitty panes
window_border_width 0pt
# No confirmation on close
confirm_os_window_close 0

# ============================================================
# Tab Bar
# ============================================================
tab_bar_style powerline

# ============================================================
# Performance
# ============================================================
# Reduce input latency (default 3ms)
input_delay 1

# ============================================================
# Clipboard
# ============================================================
# Enable OSC 52 read and write
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ============================================================
# Advanced
# ============================================================
# Allow remote control (e.g. kitty @ set-font-size 18)
allow_remote_control yes

